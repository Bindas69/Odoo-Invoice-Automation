name: Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoopass123
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      
      - name: Test environment variables
        run: |
          if [ ! -f .env.example ]; then
            echo "Error: .env.example not found!"
            exit 1
          fi
          echo "✓ .env.example exists"
      
      - name: Validate Docker Compose
        run: docker-compose config > /dev/null
      
      - name: Check documentation
        run: |
          if [ ! -f README.md ]; then exit 1; fi
          if [ ! -f QUICKSTART.md ]; then exit 1; fi
          if [ ! -f DEPLOYMENT.md ]; then exit 1; fi
          echo "✓ All documentation files present"
      
      - name: Validate JSON files
        run: |
          find . -name "*.json" -not -path "./node_modules/*" | while read f; do
            jq empty "$f" 2>/dev/null || echo "Invalid JSON: $f"
          done

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check for secrets
        run: |
          if grep -r "password\|secret\|key" .env 2>/dev/null; then
            echo "Warning: Potential secrets in .env"
          fi
          if grep -r "ODOO_PASSWORD\|TWILIO_AUTH_TOKEN" --include="*.py" --include="*.js" .; then
            echo "Warning: Hardcoded credentials detected!"
            exit 1
          fi
      
      - name: Verify .gitignore
        run: |
          if ! grep -q "^\.env$" .gitignore; then
            echo "Error: .env not in .gitignore!"
            exit 1
          fi

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker images
        run: docker-compose build --no-cache
      
      - name: Validate containers start
        run: |
          docker-compose up -d
          sleep 30
          docker-compose ps
          docker-compose down

  deploy:
    runs-on: ubuntu-latest
    needs: [test, security-scan, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to production
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
            cd /root/production/Odoo-Invoice-Automation
            git pull origin main
            docker-compose pull
            docker-compose up -d
          EOF

  notify:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: always()
    
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Invoice Automation CI/CD - ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Build Status*: ${{ job.status }}\n*Commit*: ${{ github.sha }}\n*Branch*: ${{ github.ref }}"
                  }
                }
              ]
            }
