version: '3.8'

services:
  # PostgreSQL Database for Odoo and n8n
  postgres:
    image: postgres:16-alpine
    container_name: postgres_invoice_automation
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoopass123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - invoice_network
    restart: unless-stopped

  # Odoo ERP Platform
  odoo:
    image: odoo:17.0
    container_name: odoo_invoice_automation
    environment:
      HOST: postgres
      USER: odoo
      PASSWORD: odoopass123
      DB_PORT_5432_TCP_ADDR: postgres
      DB_PORT_5432_TCP_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - odoo_addons:/mnt/extra-addons
      - odoo_data:/var/lib/odoo
    ports:
      - "8069:8069"
    networks:
      - invoice_network
    restart: unless-stopped
    command: odoo --db_host=postgres --db_port=5432 --db_user=odoo --db_password=odoopass123 --database=odoo


  # n8n Automation Platform
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_invoice_automation
    environment:
      # Basic n8n settings
      N8N_HOST: ${N8N_URL:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      
      # PostgreSQL backend for n8n (optional, uses SQLite by default)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_db
      DB_POSTGRESDB_USER: odoo
      DB_POSTGRESDB_PASSWORD: odoopass123
      
      # Execution settings
      N8N_EXECUTION_MODE: regular  # Use 'queue' for production
      N8N_EXECUTION_TIMEOUT: 600   # 10 minutes
      N8N_EXECUTION_DATA_SAVE_ON_SUCCESS: "true"
      N8N_EXECUTION_DATA_SAVE_ON_FAILURE: "true"
      N8N_EXECUTION_DATA_SAVE_ON_ERROR: "true"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      ODOO_USER: ${ODOO_USER}
      ODOO_PASSWORD: ${ODOO_PASSWORD}
      
      # Logging
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
      N8N_LOG_OUTPUT: console
      
      # Timezone
      TZ: UTC
      
      # Security (update in production)
      N8N_USER_MANAGEMENT_DISABLED: "false"
      N8N_SECURE_COOKIE: "false"  # Set to 'true' for HTTPS
      
      # Optional: Analytics
      N8N_ANALYTICS: "false"
      
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - n8n_files_data:/files
    ports:
      - "5678:5678"
    networks:
      - invoice_network
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "n8n", "--version"]
      interval: 10s
      timeout: 5s
      retries: 3
  

  # Redis (Optional, for queue-based execution in production)
  # Uncomment this section if running n8n in queue mode
  # redis:
  #   image: redis:7-alpine
  #   container_name: redis_invoice_automation
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - invoice_network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

volumes:
  postgres_data:
    driver: local
  odoo_data:
    driver: local
  odoo_addons:
    driver: local
  n8n_data:
    driver: local
  n8n_files_data:
    driver: local  
  # redis_data:
  #   driver: local

networks:
  invoice_network:
    driver: bridge

# Usage:
# Development: docker-compose up
# Detached:    docker-compose up -d
# Logs:        docker-compose logs -f n8n
# Stop:        docker-compose down
# Full cleanup: docker-compose down -v
